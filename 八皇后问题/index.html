    <div class="post-body" itemprop="articleBody"><p><strong>洛谷p1219八皇后</strong><br>采用按行枚举的方式进行深度搜索<br>&#x2F;&#x2F;这是一道典型的八皇后问题，我要输出前三个解，创建几个数组</p>
<figure class="highlight plaintext"><table><tr><td class="gutter"><pre><span class="line">1</span><br><span class="line">2</span><br><span class="line">3</span><br><span class="line">4</span><br><span class="line">5</span><br><span class="line">6</span><br><span class="line">7</span><br><span class="line">8</span><br><span class="line">9</span><br><span class="line">10</span><br><span class="line">11</span><br><span class="line">12</span><br><span class="line">13</span><br><span class="line">14</span><br><span class="line">15</span><br><span class="line">16</span><br><span class="line">17</span><br><span class="line">18</span><br><span class="line">19</span><br><span class="line">20</span><br><span class="line">21</span><br><span class="line">22</span><br><span class="line">23</span><br><span class="line">24</span><br><span class="line">25</span><br><span class="line">26</span><br><span class="line">27</span><br><span class="line">28</span><br><span class="line">29</span><br><span class="line">30</span><br><span class="line">31</span><br><span class="line">32</span><br><span class="line">33</span><br><span class="line">34</span><br><span class="line">35</span><br><span class="line">36</span><br><span class="line">37</span><br><span class="line">38</span><br><span class="line">39</span><br><span class="line">40</span><br><span class="line">41</span><br><span class="line">42</span><br><span class="line">43</span><br><span class="line">44</span><br><span class="line">45</span><br><span class="line">46</span><br><span class="line">47</span><br><span class="line">48</span><br><span class="line">49</span><br><span class="line">50</span><br><span class="line">51</span><br><span class="line">52</span><br><span class="line">53</span><br><span class="line">54</span><br><span class="line">55</span><br><span class="line">56</span><br><span class="line">57</span><br><span class="line">58</span><br><span class="line">59</span><br><span class="line">60</span><br><span class="line">61</span><br><span class="line">62</span><br><span class="line">63</span><br><span class="line">64</span><br><span class="line">65</span><br><span class="line">66</span><br><span class="line">67</span><br><span class="line">68</span><br><span class="line">69</span><br><span class="line">70</span><br><span class="line">71</span><br><span class="line">72</span><br><span class="line">73</span><br><span class="line">74</span><br><span class="line">75</span><br><span class="line">76</span><br><span class="line">77</span><br><span class="line">78</span><br><span class="line">79</span><br><span class="line">80</span><br><span class="line">81</span><br><span class="line">82</span><br><span class="line">83</span><br><span class="line">84</span><br><span class="line">85</span><br><span class="line">86</span><br><span class="line">87</span><br><span class="line">88</span><br><span class="line">89</span><br><span class="line">90</span><br><span class="line">91</span><br><span class="line">92</span><br><span class="line">93</span><br><span class="line">94</span><br><span class="line">95</span><br><span class="line">96</span><br><span class="line">97</span><br><span class="line">98</span><br><span class="line">99</span><br></pre></td><td class="code"><pre><span class="line">#include&lt;iostream&gt;</span><br><span class="line">using namespace std;</span><br><span class="line">const int N = 110;</span><br><span class="line">int n,idx,a;</span><br><span class="line">int g[N];</span><br><span class="line">bool dg[N], udg[N], col[N];//col表示列，dg表示对角线，udg表示副对角线，g表示地图</span><br><span class="line">void  dfs(int u)</span><br><span class="line">&#123;</span><br><span class="line">	if (u == n) &#123;</span><br><span class="line">		if (idx &lt; 3) &#123;</span><br><span class="line">			for (int i = 0; i &lt; n; i++) &#123;</span><br><span class="line">				if (g[i] != -1)cout &lt;&lt; g[i]+1 &lt;&lt; &quot; &quot;;</span><br><span class="line">			&#125;</span><br><span class="line">			cout &lt;&lt; endl;</span><br><span class="line">		    idx++;</span><br><span class="line">	    &#125;</span><br><span class="line">	a++;</span><br><span class="line">	return;</span><br><span class="line">    &#125;</span><br><span class="line">	for (int i = 0; i &lt; n; i++) &#123;</span><br><span class="line">		if (!col[i] &amp;&amp; !dg[u + i] &amp;&amp; !udg[n - u + i]) &#123;</span><br><span class="line">			g[u] = i;</span><br><span class="line">			col[i] = dg[u + i] = udg[n - u + i] = true;</span><br><span class="line">			dfs(u + 1);</span><br><span class="line"></span><br><span class="line">			col[i] = dg[u + i] = udg[n - u + i] = false;</span><br><span class="line">			g[u] = -1;</span><br><span class="line">		&#125;</span><br><span class="line">	&#125;</span><br><span class="line">&#125;</span><br><span class="line">int main() &#123;</span><br><span class="line">	cin &gt;&gt; n;</span><br><span class="line">	idx = 0;</span><br><span class="line">	memset(g, -1, sizeof g);</span><br><span class="line">	dfs(0);</span><br><span class="line">	cout &lt;&lt; a;</span><br><span class="line">&#125;```</span><br><span class="line"></span><br><span class="line">``````</span><br><span class="line">**p1162填色问题**</span><br><span class="line">这道题花了两个小时,代码量可以很少,本题思路是把边框联通的0全部标记,将剩下的0变为2</span><br><span class="line">以下是完整的代码块</span><br><span class="line">```#include&lt;iostream&gt;</span><br><span class="line">#include&lt;cstring&gt;</span><br><span class="line">using namespace std;</span><br><span class="line">int n;</span><br><span class="line">const int N = 35;</span><br><span class="line">int g[N][N];</span><br><span class="line">int vis[N][N];</span><br><span class="line"></span><br><span class="line">void dfs(int x,int y) &#123;</span><br><span class="line">	int dx[5] = &#123; 0,-1,0,1,0 &#125;, dy[5] = &#123; 0,0,1,0,-1 &#125;;</span><br><span class="line">	for (int i = 1; i &lt;= 4; i++) &#123;</span><br><span class="line">		int x1 = x + dx[i], y1 = y + dy[i];</span><br><span class="line">		if (x1&lt;1 || x1&gt;n || y1&lt;1 || y1&gt;n || vis[x1][y1] == 0||g[x1][y1]==1)continue;</span><br><span class="line">		else &#123;</span><br><span class="line">		//	cout &lt;&lt; x1 &lt;&lt; &quot; &quot; &lt;&lt; y1 &lt;&lt; endl;</span><br><span class="line">			vis[x1][y1] = 0;</span><br><span class="line">			dfs(x1, y1);</span><br><span class="line">		&#125;</span><br><span class="line"></span><br><span class="line">	&#125;</span><br><span class="line">	</span><br><span class="line"></span><br><span class="line">&#125;</span><br><span class="line">int main() &#123;</span><br><span class="line">	memset(vis, -1,sizeof vis );</span><br><span class="line">	cin &gt;&gt; n;</span><br><span class="line">	for (int i = 1; i &lt;= n; i++) &#123;</span><br><span class="line">		for (int j = 1; j &lt;= n; j++)cin &gt;&gt; g[i][j];</span><br><span class="line">	&#125;</span><br><span class="line">	//分别在左右上下的边框进行遍历并且打标记</span><br><span class="line">	for (int i = 1; i &lt;= n; i++) &#123;</span><br><span class="line">			if (g[1][i] != 1 &amp;&amp; vis[1][i] ==-1) &#123;</span><br><span class="line">				dfs(1, i);</span><br><span class="line">			&#125;</span><br><span class="line">			if (g[n][i] != 1 &amp;&amp; vis[n][i] == -1) &#123;</span><br><span class="line">				dfs(n, i);</span><br><span class="line">			&#125;</span><br><span class="line">			if (g[i][1] != 1 &amp;&amp; vis[i][1] == -1) &#123;</span><br><span class="line">				dfs(i, 1);</span><br><span class="line">			&#125;</span><br><span class="line">			if (g[i][n] != 1 &amp;&amp; vis[i][n] == -1) &#123;</span><br><span class="line">				dfs(i, n);</span><br><span class="line">			&#125;</span><br><span class="line">	&#125;</span><br><span class="line">	for (int i = 1; i &lt;= n; i++) &#123;</span><br><span class="line">		for (int j = 1; j &lt;= n; j++) &#123;</span><br><span class="line">			if (vis[i][j] == -1 &amp;&amp; g[i][j] == 1)cout &lt;&lt; 1&lt;&lt;&quot; &quot;;</span><br><span class="line">			if (vis[i][j] == 0 &amp;&amp; g[i][j] == 0)cout &lt;&lt; 0&lt;&lt;&quot; &quot;;</span><br><span class="line">			if (vis[i][j] == -1 &amp;&amp; g[i][j] == 0)cout &lt;&lt; 2 &lt;&lt;&quot; &quot;;</span><br><span class="line">			//针对标记进行输出的更改~冗长~</span><br><span class="line">		&#125;cout &lt;&lt; endl;</span><br><span class="line">	&#125;</span><br><span class="line"></span><br><span class="line"></span><br><span class="line">	return 0;</span><br><span class="line">&#125;</span><br><span class="line"></span><br></pre></td></tr></table></figure>
